name: kigali_pullup
description: "Kigali City Services & Places Directory"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  url_launcher: ^6.2.6
  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  fake_cloud_firestore: ^3.0.0
  firebase_auth_mocks: ^0.14.0

flutter:
  uses-material-design: true
